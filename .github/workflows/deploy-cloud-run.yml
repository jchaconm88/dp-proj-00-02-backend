# CD: build TypeScript + Docker + despliegue Cloud Run.
# La infraestructura (proyecto GCP, SAs, Firebase, etc.) vive en dp-proj-00-02-infra (Terraform).
#
# GitHub Environment (dev / qa / prd): define vars/secrets según outputs de Terraform / sync-github-env.sh.
#
# Secrets típicos: GCP_SERVICE_ACCOUNT (JSON de github-deploy-backend@…).
# Variables: GCP_PROJECT_ID, CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT, opcional CLOUD_RUN_SERVICE_NAME.

name: Deploy Cloud Run

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub Environment (dev|qa|prd)"
        type: choice
        required: true
        default: dev
        options:
          - dev
          - qa
          - prd

env:
  NODE_VERSION: "22"
  CLOUD_RUN_REGION: us-central1
  TF_IN_AUTOMATION: "1"
  TF_INPUT: "0"

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build & Docker
    runs-on: ubuntu-latest
    concurrency:
      group: backend-build-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Docker build (sanity)
        run: docker build -t backend-ci:${{ github.sha }} .

  deploy:
    name: Deploy Cloud Run
    runs-on: ubuntu-latest
    needs:
      - build
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || vars.DEPLOY_ENVIRONMENT || 'dev' }}
    concurrency:
      group: backend-deploy-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || vars.DEPLOY_ENVIRONMENT || 'dev' }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Comprobar variables de entorno
        run: |
          if [[ -z "${{ vars.GCP_PROJECT_ID }}" ]]; then
            echo "::error::Define la variable del Environment GCP_PROJECT_ID (output de dp-proj-00-02-infra)."
            exit 1
          fi
          if [[ -z "${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}" ]]; then
            echo "::error::Define CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT en el Environment."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          set -euo pipefail
          SERVICE_NAME="${CLOUD_RUN_SERVICE_NAME_EFFECTIVE}"
          args=(
            run deploy "${SERVICE_NAME}"
            --source .
            --region "${{ env.CLOUD_RUN_REGION }}"
            --project "${GCP_PROJECT_EFFECTIVE}"
            --service-account "${CLOUD_RUN_RUNTIME_SA_EFFECTIVE}"
            --allow-unauthenticated
            --quiet
          )
          # CORS: lista separada por comas (mismo formato que src/server.ts). El delimitador ^:^
          # evita que gcloud trocee mal el valor cuando hay varios orígenes.
          if [[ -n "${CORS_ORIGINS_EFFECTIVE:-}" ]]; then
            args+=(--update-env-vars "^:^CORS_ORIGINS:${CORS_ORIGINS_EFFECTIVE}")
          fi
          gcloud "${args[@]}"
        env:
          GCP_PROJECT_EFFECTIVE: ${{ vars.GCP_PROJECT_ID }}
          CLOUD_RUN_RUNTIME_SA_EFFECTIVE: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
          CLOUD_RUN_SERVICE_NAME_EFFECTIVE: ${{ vars.CLOUD_RUN_SERVICE_NAME || 'dp-proj-00-02-backend' }}
          CORS_ORIGINS_EFFECTIVE: ${{ vars.CORS_ORIGINS }}
